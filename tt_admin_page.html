<div class="header-h3">
     <h3>Адміністративна сторінка <br> Розкладу занятть</h3>
  </div>
  <br>
  <h4> Адміністратор {{ user.get_full_name }} </h4>

<div style="width: 100%; text-align: center;">
    <form method='post' enctype='multipart/form-data' action='/simple_upload/' charset="utf-8" id='new_rasp' >
      {% csrf_token %}
      <p>Оберіть файл розкладу</p>
      <p><input type="file" name="tt_file" ></p>
      <br>
      <p>Та виконайте оновлення</p>
      <button type="submit" form = "new_rasp"> Оновити </button>
     </form>
  </div>
  <div  style="width: 100%; text-align: center;">
     <hr width="100%">
     {{ error }}
  </div>
