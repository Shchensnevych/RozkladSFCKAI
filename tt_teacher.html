
  <div class="header-h3">
     <h3>Розклад занять щодо викладачів</h3>
  </div>
  <br>
  <h3> {{ fam }} </h3>
  {% for day in days.items %}
       <div>
          <table width = 100%>
            <th colspan=3 bgcolor="#dddddd"> {{day.0}} </th>
            {% for pair in day.1 %}
            <tr>
               <td width=5%  style="border-right: solid gray; border-bottom: dashed lightgray; text-align: center;"> {{ pair.pair }} </td>
               <td width=45% style="border-right: solid gray; border-bottom: dashed lightgray; text-align: center;"> {{ pair.gname }} </td>
               <td width=45% style="border-bottom: dashed lightgray; text-align: center;"> {{ pair.lesson }} </td>
            </tr>
            {% endfor %}
          </table>       
       </div>
       <br>
       <br>
  {% endfor %}
  <br>
  {{ error }}
